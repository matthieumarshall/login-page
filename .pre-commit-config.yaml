repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: no-commit-to-branch
        args: [--branch, main]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.8
    hooks:
      - id: bandit
        args: ["-r", "src/", "-ll", "--skip", "B101"]
        pass_filenames: false
        # B101 (assert usage) is acceptable in test support code;
        # -ll = medium severity and above only

  # YAML syntax and formatting
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: [--strict]

  # GitHub Actions workflow static analysis:
  # validates expression syntax, checks for undefined secrets, action versions, etc.
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.7
    hooks:
      - id: actionlint

  - repo: local
    hooks:
      - id: ty
        name: ty
        language: system
        entry: uv run ty check
        pass_filenames: false

      - id: djlint
        name: djlint
        language: system
        entry: uv run djlint --lint
        files: ^templates/.*\.html$
