{% if not races %}
<p class="text-muted">No results available for this fixture.</p>
{% else %}
<nav aria-label="Race tabs" class="mb-3">
  <div class="btn-group flex-wrap" role="group">
    {% for race in races %}
    <button
      type="button"
      class="btn btn-outline-secondary{% if active_race and active_race.id == race.id %} active{% endif %}"
      hx-get="/results/race-table?race_id={{ race.id }}&fixture_id={{ active_fixture.id }}&season_id={{ season_id }}"
      hx-target="#race-table"
      hx-swap="innerHTML"
      hx-push-url="true"
      aria-label="Race: {{ race.name }}"
      aria-pressed="{{ 'true' if active_race and active_race.id == race.id else 'false' }}"
    >{{ race.name }}</button>
    {% endfor %}
  </div>
</nav>

{# Filter controls island — sentinel for results-filter.js #}
<div id="results-filter" data-race-id="{{ active_race.id if active_race else '' }}">
  <div class="d-flex flex-wrap align-items-end gap-3 mb-3">
    <div>
      <label for="filter-category" class="form-label mb-1 small fw-semibold">Category</label>
      <select id="filter-category" class="form-select form-select-sm" aria-label="Filter by category">
        <option value="">All categories</option>
      </select>
    </div>
    <div>
      <label for="filter-club" class="form-label mb-1 small fw-semibold">Club</label>
      <select id="filter-club" class="form-select form-select-sm" aria-label="Filter by club">
        <option value="">All clubs</option>
      </select>
    </div>
    <div>
      <label for="filter-gender" class="form-label mb-1 small fw-semibold">Gender</label>
      <select id="filter-gender" class="form-select form-select-sm" aria-label="Filter by gender">
        <option value="">All genders</option>
        <option value="Male">Male</option>
        <option value="Female">Female</option>
      </select>
    </div>
    <div>
      <label for="filter-name" class="form-label mb-1 small fw-semibold">Name</label>
      <input
        id="filter-name"
        type="search"
        class="form-control form-control-sm"
        placeholder="Search name…"
        aria-label="Search by name"
        style="min-width: 160px;"
      >
    </div>
    <div class="d-flex gap-3 align-items-end">
      <div class="form-check form-check-inline mb-0">
        <input class="form-check-input" type="checkbox" id="toggle-pos" checked>
        <label class="form-check-label small" for="toggle-pos">Show Pos</label>
      </div>
      <div class="form-check form-check-inline mb-0">
        <input class="form-check-input" type="checkbox" id="toggle-gen-pos">
        <label class="form-check-label small" for="toggle-gen-pos">Show Gen Pos</label>
      </div>
    </div>
    {% if active_race %}
    <div class="ms-auto d-flex gap-2">
      <a
        id="export-csv-link"
        href="/results/export/csv?race_id={{ active_race.id }}"
        class="btn btn-sm btn-outline-secondary"
        download
        aria-label="Export results as CSV"
      >↓ CSV</a>
      <a
        id="export-pdf-link"
        href="/results/export/pdf?race_id={{ active_race.id }}"
        class="btn btn-sm btn-outline-secondary"
        download
        aria-label="Export results as PDF"
      >↓ PDF</a>
    </div>
    {% endif %}
  </div>
</div>

<div id="race-table">
  {% include "_results_race_table.html" %}
</div>
{% endif %}
