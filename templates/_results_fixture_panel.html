{% if not selected_season %}
<p class="text-muted">No season selected.</p>
{% elif not fixtures %}
<p class="text-muted">No fixtures for {{ selected_season.name }} yet.</p>
{% else %}
<nav aria-label="Fixture tabs" class="mb-3">
  <div class="btn-group flex-wrap" role="group">
    {% for fixture in fixtures %}
    <button
      type="button"
      class="btn btn-outline-secondary{% if active_fixture and active_fixture.id == fixture.id %} active{% endif %}"
      hx-get="/results/race-panel?fixture_id={{ fixture.id }}&season_id={{ selected_season.id }}"
      hx-target="#race-panel"
      hx-swap="innerHTML"
      hx-push-url="true"
      aria-label="Fixture {{ loop.index }}: {{ fixture.title }}"
      aria-pressed="{{ 'true' if active_fixture and active_fixture.id == fixture.id else 'false' }}"
    >{{ loop.index }}. {{ fixture.title }}</button>
    {% endfor %}
  </div>
</nav>

<div id="race-panel">
  {% if active_fixture %}
  {% include "_results_race_panel.html" %}
  {% endif %}
</div>
{% endif %}
