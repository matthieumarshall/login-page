<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}My Website{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/style.css" rel="stylesheet">
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark" aria-label="Site navigation">
    <div class="container-fluid px-3">
      <a class="navbar-brand" href="/news">My Website</a>

      <div class="ms-auto d-flex align-items-center gap-2">
        {% if current_user %}
          <span class="navbar-text text-white">Hello, {{ current_user.username }}!</span>
          <form action="/logout" method="post" class="d-inline m-0">
            <button type="submit" class="btn btn-outline-light btn-sm">Log out</button>
          </form>
        {% else %}
          <a href="/login" class="btn btn-outline-light btn-sm">Login</a>
        {% endif %}
      </div>
    </div>
  </nav>

  <div class="container-fluid p-0">
    <div class="row g-0">

      <!-- Mobile sidebar toggle (hidden on md+) -->
      <div class="col-12 d-md-none">
        <button
          class="btn btn-outline-secondary btn-sm m-2"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#sidebarMenu"
          aria-expanded="false"
          aria-controls="sidebarMenu"
        >
          &#9776; Navigation
        </button>
      </div>

      <!-- Sidebar column (collapses on mobile, always visible on md+) -->
      <div class="col-md-3 col-xl-2 px-0">
        <div id="sidebarMenu" class="collapse d-md-block">
          <nav class="sidebar py-3 px-2" aria-label="Main navigation">
            <ul class="nav flex-column">
              {% for item in sidebar_items %}
              <li class="nav-item">
                <a
                  class="nav-link{{ ' active' if current_page == item.page else '' }}"
                  href="{{ item.route }}"
                >{{ item.name }}</a>
              </li>
              {% endfor %}
            </ul>
          </nav>
        </div>
      </div>

      <!-- Main content column -->
      <main class="col-md-9 col-xl-10 py-4 px-4">
        {% block content %}{% endblock %}
      </main>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
