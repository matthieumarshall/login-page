{% extends "base.html" %}

{% block title %}Results — Oxfordshire Cross Country League{% endblock %}

{% block content %}
<div>
  <h1 class="h3 mb-3">Results</h1>

  <div class="d-flex flex-wrap align-items-center gap-2 mb-3">
    {% if seasons %}
    <label for="season-select" class="form-label mb-0 fw-semibold">Season:</label>
    <select
      id="season-select"
      name="season_id"
      class="form-select w-auto"
      hx-get="/results/fixture-panel"
      hx-trigger="change"
      hx-target="#fixture-panel"
      hx-swap="innerHTML"
      hx-push-url="true"
      aria-label="Select season"
    >
      {% for season in seasons %}
      <option
        value="{{ season.id }}"
        {% if selected_season and selected_season.id == season.id %}selected{% endif %}
      >{{ season.name }}</option>
      {% endfor %}
    </select>
    {% else %}
    <p class="text-muted mb-0">No seasons yet.</p>
    {% endif %}
  </div>

  <div id="fixture-panel">
    {% include "_results_fixture_panel.html" %}
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script src="/static/results-filter.js"></script>
{% endblock %}
