[build]
verbose = false

[secrets]
entropy = 3.5
threshold = 3.5

# Global allowlist: paths and regex patterns that should never trigger secret detection.
# Use [allowlist] (not [[rules]]) for exclusions — [[rules]] entries are detection rules.
[allowlist]
  description = "Exclude build artifacts, docs, and test DB filenames"
  paths = [
    '''node_modules/''',
    '''__pycache__/''',
    '''\.venv/''',
    '''IMPLEMENTATION_SUMMARY\.md''',
  ]
  regexes = [
    '''test_.*\.db''',
  ]
